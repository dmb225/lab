
# Service for lab Backend
apiVersion: v1
kind: Service
metadata:
  name: lab-backend
  namespace: lab
  labels:
    app.kubernetes.io/name: lab
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: lab
    app.kubernetes.io/component: backend
